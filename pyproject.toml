[project]
name = "mhsxtrapy"
version = "0.1.0"
description = "Magnetohydrostatic extrapolation of photospheric magnetic field data into the solar corona"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "astropy>=7.2.0",
    "bs4>=0.0.2",
    "drms>=0.9.0",
    "h5py>=3.16.0",
    "lxml>=6.0.2",
    "matplotlib>=3.10.8",
    "mpl-animators>=1.2.4",
    "numba>=0.64.0",
    "numpy>=2.4.3",
    "reproject>=0.19.0",
    "scipy>=1.17.1",
    "sunpy>=7.1.0",
    "zeep>=4.3.2",
]

[project.optional-dependencies]
dev = [
    "pre-commit>=4.5.1",
]
test = [
    "pytest>=8.0.0",
    "pytest-cov>=6.0.0",
]

[tool.setuptools.packages.find]
include = ["mhsxtrapy*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
